services:
  sftp:
    image: atmoz/sftp
    healthcheck:
      test: ["CMD-SHELL", "ps -e | grep sshd || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    command: testuser:testpass:::upload

  app:
    build: .
    ports:
      - "3500:3000"
    environment:
      - SFTP_HOST=sftp
      - SFTP_PORT=22
      - SFTP_USER=testuser
      - SFTP_PASSWORD=testpass
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3500
    depends_on:
      sftp:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
